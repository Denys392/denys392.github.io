<article class="project-card group">
  
  <header class="mt-4">
    <h3 class="text-lg sm:text-xl font-semibold tracking-tight text-slate-900">
      {{ project().title }}
    </h3>
    
    @if (project().cover) {
      <div class="overflow-hidden rounded-xl border border-slate-200 bg-slate-50">
        <img
          class="h-44 w-full object-cover transition-transform duration-300 group-hover:scale-[1.02]"
          [src]="`assets/images/projects/${project().slug}/${project().cover}`"
          [alt]="project().title + ' - portada'"
          width="600"
          height="400"
          loading="eager"
        />
      </div>
    }
    <p class="mt-2 text-sm text-slate-600 leading-relaxed line-clamp-3">
      {{ project().descriptionShort }}
    </p>
  </header>

  @if (visibleTechs().length) {
    <ul class="mt-4 flex flex-wrap gap-2">
      @for (t of visibleTechs(); track t.id) {
        <li class="chip">
          @if (t.icon) {
            <img
              class="h-4 w-4"
              [src]="t.icon"
              [alt]="t.name"
              width="16"
              height="16"
              loading="lazy"
            />
          }
          <span class="text-slate-700">{{ t.name }}</span>
        </li>
      }

      @if (remainingTechCount() > 0) {
        <li class="chip text-slate-600">+{{ remainingTechCount() }}</li>
      }
    </ul>
  }

  <footer class="mt-5 flex flex-wrap items-center justify-between gap-2">
    <a class="project-cta" [routerLink]="['/projects', project().slug]">
      Ver proyecto
      <span class="transition-transform group-hover:translate-x-0.5" aria-hidden="true">→</span>
    </a>

    <span class="text-xs text-slate-500">Detalles</span>
  </footer>
</article>
