<section id="skills" class="section">
  <div class="container-page">
    <h2 class="section-title">Skills</h2>
    <p class="section-subtitle">Tecnologías con las que trabajo y me siento cómodo.</p>

    <div class="mt-8 grid gap-6 md:grid-cols-2">
      @for (g of groups(); track g.name) {
        <article class="card card-pad">
          <h3 class="text-lg font-semibold capitalize text-slate-900">{{ g.name }}</h3>

          <ul class="mt-4 flex flex-wrap gap-2">
            @for (t of g.technologies; track t.id) {
              <li class="chip">
                @if (t.icon) {
                  <img [src]="t.icon" [alt]="t.name" width="16" height="16" />
                }
                <span class="text-slate-700">{{ t.name }}</span>
              </li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
