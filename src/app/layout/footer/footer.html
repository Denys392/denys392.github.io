<footer class="border-t border-slate-200/80 bg-white/60">
  <div class="container-page py-10">
    <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="text-sm text-slate-600">
          © {{ dateYear }}
          <span class="font-medium text-slate-900">{{ profile()?.author ?? 'Denys' }}</span>
        </p>
        <p class="mt-1 text-xs text-slate-500">Construido con Angular + TailwindCSS</p>
      </div>

      <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm">
        @if (profile()?.contact?.github?.link) {
          <a
            class="link"
            [href]="profile()?.contact?.github?.link"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        }

        @if (profile()?.contact?.linkedin?.link) {
          <a
            class="link"
            [href]="profile()?.contact?.linkedin?.link"
            target="_blank"
            rel="noreferrer"
          >
            LinkedIn
          </a>
        }

        @if (profile()?.contact?.cv?.link) {
          <a class="link" [href]="profile()?.contact?.cv?.link" target="_blank" rel="noreferrer">
            CV
          </a>
        }
      </div>
    </div>
  </div>
</footer>
