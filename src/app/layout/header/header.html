<header class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-slate-200">
  <div class="container-page">
    <div class="flex items-center justify-between h-16">
      <a class="inline-flex items-center gap-3" [routerLink]="['/']" fragment="home" aria-label="Ir al inicio">
        <img
          src="assets/images/profile/Logo-white.png"
          alt="Logo"
          class="h-8 w-8 rounded-lg border border-slate-200 bg-white object-contain"
        />
        <span class="hidden sm:block text-base font-semibold text-slate-900">
          {{ profile()?.author ?? 'Mi portafolio' }}
        </span>
      </a>

      <app-nav></app-nav>
    </div>
  </div>
</header>
